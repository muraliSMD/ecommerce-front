version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "MONGODB_URI=$MONGODB_URI" >> .env.production
        - echo "JWT_SECRET=$JWT_SECRET" >> .env.production
        - echo "CLOUDINARY_NAME=$CLOUDINARY_NAME" >> .env.production
        - echo "CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY" >> .env.production
        - echo "CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET" >> .env.production
        - echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> .env.production
        - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env.production
        - echo "NEXT_PUBLIC_CLOUDINARY_NAME=$NEXT_PUBLIC_CLOUDINARY_NAME" >> .env.production
        - echo "NEXT_PUBLIC_CLOUDINARY_API_KEY=$NEXT_PUBLIC_CLOUDINARY_API_KEY" >> .env.production
        - echo "NEXT_PUBLIC_CLOUDINARY_API_SECRET=$NEXT_PUBLIC_CLOUDINARY_API_SECRET" >> .env.production
        - echo "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=$NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME" >> .env.production
        - echo "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=$NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME" >> .env.production
        - echo "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=$NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME" >> .env.production

    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
